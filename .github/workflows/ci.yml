name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — Backend validation
  # Format, lint, type-check, unit tests with coverage. Cheap, fails fast.
  # All downstream jobs depend on this so a typo doesn't burn the container
  # build or the security scan.
  # ---------------------------------------------------------------------------
  backend:
    # NB: name must match the required status check in
    # infra/github/branch-protection.json. Keep it stable.
    name: Backend validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (compatible extras)
        # `tracking` (mlflow) conflicts with `ml` (drain3's cachetools pin),
        # so we install everything except tracking. A dedicated job exercises
        # the tracking path once task #12 lands.
        run: |
          uv sync --python ${{ env.PYTHON_VERSION }} \
            --extra storage --extra orchestration --extra data \
            --extra streaming --extra ml --extra llm --extra embedder

      - name: Lockfile is up to date
        run: uv lock --check

      - name: Format check (black)
        run: uv run black --check src tests

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type check (mypy --strict)
        run: uv run mypy src

      - name: Unit tests + coverage
        run: |
          uv run pytest -q \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Stage 2 — Security
  # SAST (Bandit), dependency vulnerability scan (pip-audit), and filesystem
  # CVE scan (Trivy). Soft-fails pip-audit since transitive CVEs in heavy ML
  # deps are noisy and rarely actionable in this codebase; SAST and Trivy on
  # HIGH/CRITICAL stay strict.
  # ---------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Bandit (SAST)
        run: uvx bandit -r src -c pyproject.toml

      - name: Export runtime requirements
        run: |
          uv export \
            --python ${{ env.PYTHON_VERSION }} \
            --no-dev \
            --no-hashes \
            --format requirements-txt \
            > runtime-requirements.txt

      - name: pip-audit (dependency CVEs, advisory)
        continue-on-error: true
        run: uvx pip-audit --strict --requirement runtime-requirements.txt

      - name: Trivy (filesystem scan, HIGH/CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Stage 3 — Container build + image scan + smoke test
  # Builds the production image, scans the built layers for CVEs, and runs
  # the container with /health/live polled to confirm it boots cleanly. This
  # catches Dockerfile regressions that unit tests can't.
  # ---------------------------------------------------------------------------
  container:
    # NB: name must match the required status check in
    # infra/github/branch-protection.json. Keep it stable.
    name: Container build
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: dataforge:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy (image CVEs, HIGH/CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dataforge:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Smoke test — image boots and /health/live answers
        run: |
          docker run -d --name dataforge-ci \
            -p 8000:8000 \
            -e DATAFORGE_LLM_PROVIDER=null \
            -e DATAFORGE_RAG_EMBEDDER=hashing \
            -e DATAFORGE_POSTGRES_DSN=sqlite+aiosqlite:////tmp/dataforge.db \
            -e DATAFORGE_METRICS_ENABLED=false \
            -e DATAFORGE_TRACING_ENABLED=false \
            dataforge:ci
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health/live >/dev/null 2>&1; then
              echo "container is live"
              curl -s http://localhost:8000/health/live
              docker stop dataforge-ci
              exit 0
            fi
            sleep 1
          done
          echo "container did not become live within 30s"
          docker logs dataforge-ci
          docker stop dataforge-ci || true
          exit 1
